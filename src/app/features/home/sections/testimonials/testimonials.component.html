<section id="testimonials" class="relative section-padding overflow-hidden">
  <app-section-header
    badge="Testimonials"
    title="Client Voices"
    subtitle="What partners and clients say about working together"
  />

  <div class="relative max-w-4xl mx-auto">
    @for (t of portfolio.testimonials; track t.id; let i = $index) {
      <div
        class="glass rounded-3xl p-8 md:p-12 text-center transition-all duration-500 absolute inset-0"
        [class.opacity-100]="activeIndex() === i"
        [class.opacity-0]="activeIndex() !== i"
        [class.pointer-events-none]="activeIndex() !== i"
        [class.z-10]="activeIndex() === i"
      >
        <div class="flex justify-center gap-1 mb-6">
          @for (star of [1,2,3,4,5]; track star) {
            <span class="text-accent text-xl">★</span>
          }
        </div>
        <p class="text-lg md:text-xl text-text-primary/90 leading-relaxed mb-8 italic">"{{ t.content }}"</p>
        <img [src]="t.avatar" [alt]="t.name" class="w-16 h-16 rounded-full mx-auto mb-4 border-2 border-accent/30" />
        <h4 class="font-semibold text-lg">{{ t.name }}</h4>
        <p class="text-text-muted text-sm">{{ t.role }} · {{ t.company }}</p>
      </div>
    }
    <div class="h-[320px] md:h-[280px]"></div>
  </div>

  <div class="flex justify-center gap-2 mt-8">
    @for (t of portfolio.testimonials; track t.id; let i = $index) {
      <button
        (click)="setIndex(i)"
        class="w-2 h-2 rounded-full transition-all"
        [class]="activeIndex() === i ? 'bg-accent w-8' : 'bg-line-strong'"
        [attr.aria-label]="'Testimonial ' + (i + 1)"
      ></button>
    }
  </div>
</section>
